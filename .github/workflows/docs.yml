name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build English docs
        run: sphinx-build -b html docs docs/_build/html/en -W --keep-going

      - name: Build Chinese docs
        run: sphinx-build -b html docs docs/_build/html/zh -D language=zh_CN -W --keep-going

      - name: Create root redirect and .nojekyll
        run: |
          cat > docs/_build/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=en/">
              <title>Redirecting...</title>
            </head>
            <body>
              <p>Redirecting to <a href="en/">English documentation</a>...</p>
            </body>
          </html>
          EOF
          touch docs/_build/html/.nojekyll

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Link check
        continue-on-error: true
        run: sphinx-build -b linkcheck docs docs/_build/linkcheck --keep-going

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Check deployment result
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "::warning::GitHub Pages deployment failed. Please ensure GitHub Pages is enabled in your repository settings:"
          echo "::warning::  1. Go to https://github.com/${{ github.repository }}/settings/pages"
          echo "::warning::  2. Under 'Build and deployment', set Source to 'GitHub Actions'"
          echo "::warning::  3. For private repos, a GitHub Pro/Team/Enterprise plan is required."
          exit 1
