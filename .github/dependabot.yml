version: 2

updates:
  # ── npm dependencies ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Group minor/patch bumps into a single PR to reduce noise
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps):"

  # ── GitHub Actions ────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "ci(deps):"
